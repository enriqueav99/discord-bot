[tool.ruff]
line-length = 100
target-version = "py311"
extend-exclude = ["img", "sonidos", ".idea"]

[tool.ruff.lint]
select = ["E", "F", "W", "I", "B", "UP", "SIM", "C4"]
ignore = ["E501"]

[tool.ruff.lint.per-file-ignores]
"tests/*" = ["B011"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
python_files = ["test_*.py"]
addopts = "--ignore=tests/e2e"
filterwarnings = [
    "ignore::DeprecationWarning",
]

[tool.pytest.ini_options.markers]
e2e = "End-to-end tests that exercise the full bot stack"
