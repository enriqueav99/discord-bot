name: e2e

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install ffmpeg (necesario para discord.FFmpegPCMAudio)
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Install deps
        run: pip install -r requirements-dev.txt

      - name: Run E2E tests
        env:
          PYTHONUNBUFFERED: "1"
        run: pytest tests/e2e -v --maxfail=3 --durations=10
